# Render Blueprint — deploys the ML backend as a free web service.
# See https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com/select-repo?type=blueprint
#   3. Select this repo → Render auto-detects this file
#   4. Click "Apply" → service deploys automatically

services:
  - type: web
    name: hydrosmart-ml
    runtime: python
    region: singapore          # closest to India
    plan: free                 # $0/month
    rootDir: ml_backend        # only deploy this folder
    buildCommand: |
      pip install --no-cache-dir -r requirements.txt
      python train_model.py --output .
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: MODEL_PATH
        value: ./model.pkl
