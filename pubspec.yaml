name: hydro_smart
description: Hydro Smart - AI-powered Hydroponics Farm Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_database: ^12.1.3
  firebase_messaging: ^16.1.1
  firebase_storage: ^13.0.6
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  state_notifier: ^1.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Networking
  dio: ^5.4.0
  http: ^1.2.0

  # Serialization
  json_annotation: ^4.9.0

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  connectivity_plus: ^7.0.0
  fl_chart: ^1.1.1

  # UI
  google_fonts: ^6.0.0
  # tflite_flutter: ^0.10.4
  image_picker: ^1.0.7
  # tflite_flutter: ^0.10.4
  # tflite_flutter_helper: ^0.3.1 # Often conflicts, using standard tflite_flutter for now

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/labels/

